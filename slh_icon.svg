<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b5cff"/>
      <stop offset="0.55" stop-color="#5865f2"/>
      <stop offset="1" stop-color="#3b3fd8"/>
    </linearGradient>
    <linearGradient id="nodes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcd6ff"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.35" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- speech bubble with smooth integrated tail -->
  <path id="bubblePath" d="M128 30
           C74 30 32 67 32 113
           C32 143 49 168 75 182
           C73 196 66 208 54 218
           C52 219.6 53 222.8 55.5 222.6
           C75 221 92 214 104 204
           C111.7 205.6 119.7 206 128 206
           C182 206 224 169 224 123
           C224 67 182 30 128 30 Z"
        fill="url(#bubble)"/>
  <!-- soft top-left sheen -->
  <path d="M128 30
           C74 30 32 67 32 113
           C32 143 49 168 75 182
           C73 196 66 208 54 218
           C52 219.6 53 222.8 55.5 222.6
           C75 221 92 214 104 204
           C111.7 205.6 119.7 206 128 206
           C182 206 224 169 224 123
           C224 67 182 30 128 30 Z"
        fill="url(#sheen)"/>

  <!-- memory constellation: symmetric diamond -->
  <g stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M128 72 L86 118 L128 164 L170 118 Z" stroke-opacity="0.9"/>
    <path d="M86 118 L170 118" stroke-opacity="0.3"/>
  </g>
  <g fill="url(#nodes)">
    <circle cx="128" cy="72" r="13"/>
    <circle cx="86" cy="118" r="10"/>
    <circle cx="170" cy="118" r="10"/>
    <circle cx="128" cy="164" r="13"/>
  </g>
  <!-- gradient-core accents in top/bottom nodes -->
  <circle cx="128" cy="72" r="5.5" fill="#4f46e5"/>
  <circle cx="128" cy="164" r="5.5" fill="#4f46e5"/>
</svg>
